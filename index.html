<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web My Find</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
            <h1>WEB MY FIND</h1>
        </header>

        <div class="search-box">
            <input type="text" id="trackingCode" placeholder="CİHAZ KODU" maxlength="6">
            <button id="searchBtn">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                BUL
            </button>
        </div>
        <div id="errorMessage" class="error-msg"></div>

        <div id="dashboard" class="hidden">
            <div class="info-grid">
                <div class="info-card">
                    <span class="card-label">Cihaz</span>
                    <span class="card-val" id="valDevice">-</span>
                </div>
                <div class="info-card">
                    <span class="card-label">Sistem</span>
                    <span class="card-val" id="valOS">-</span>
                </div>
                <div class="info-card">
                    <span class="card-label">Batarya</span>
                    <span class="card-val" id="valBattery">-%</span>
                </div>
                <div class="info-card">
                    <span class="card-label">Son Sinyal</span>
                    <span class="card-val" id="valTime">-</span>
                </div>
            </div>

            <div class="control-panel">
                <h2 class="panel-title">CİHAZ YÖNETİMİ</h2>
                <div class="control-grid">
                    
                    <div class="control-card">
                        <div class="control-header">
                            <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                            <h3>ALARM SİSTEMİ</h3>
                        </div>
                        <div class="slider-container">
                            <label for="volSlider">Ses Seviyesi: <span id="volValue">100%</span></label>
                            <input type="range" id="volSlider" min="10" max="100" value="100" step="10">
                        </div>
                        <button id="alarmBtn" class="action-btn danger-btn">SES ÇALDIR</button>
                    </div>

                    <div class="control-card">
                        <div class="control-header">
                            <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
                            <h3>EL FENERİ</h3>
                        </div>
                        <div class="btn-group">
                            <button id="flashOnBtn" class="action-btn warning-btn">AÇ</button>
                            <button id="flashOffBtn" class="action-btn secondary-btn">KAPAT</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="map-container" id="mapWrapper"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
